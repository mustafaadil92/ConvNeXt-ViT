project_name: convnext_vit_torch
experiment_name: lc25000_fold5

seed: 42
device: cuda   # auto | cpu | cuda
deterministic: false

data:
  train_csv: "data/LC25000/lc25000_5_train.csv"
  val_csv: "data/LC25000/lc25000_5_val.csv"
  test_csv: "data/LC25000/lc25000_5_test.csv"
  image_col: image_path
  label_col: label
  num_classes: 5
  input_size: 224
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2

train:
  batch_size: 64
  epochs: 50
  amp: true
  drop_last: true
  gradient_clip_norm: null

optimizer:
  name: adamw
  lr: 0.0001
  weight_decay: 0.0001

scheduler:
  name: cosine
  t_max: 100
  min_lr: 0.000001

model:
  name: convnext_vit_hybrid
  patch_size: 16
  dropout: 0.1
  num_layers : 4

output:
  checkpoint_dir: outputs/checkpoints/LC25000/convnext-vit
  log_dir: outputs/logs/LC25000/convnext-vit
  figure_dir: outputs/figures/LC25000/convnext-vit
  predictions_dir: outputs/predictions/LC25000/convnext-vit
  save_best_only: true
  monitor: val_loss
  mode: min
