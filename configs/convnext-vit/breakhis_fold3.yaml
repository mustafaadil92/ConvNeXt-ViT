project_name: convnext_vit_torch
experiment_name: breakhis_fold3

seed: 42
device: cuda   # auto | cpu | cuda
deterministic: false

data:
  train_csv: "data/folds/breakhis_3_train.csv"
  val_csv: "data/folds/breakhis_3_val.csv"
  test_csv: "data/folds/breakhis_3_test.csv"
  image_col: image_path
  label_col: label
  num_classes: 8
  input_size: 224
  num_workers: 12
  pin_memory: true
  persistent_workers: false
  prefetch_factor: 4

train:
  batch_size: 64
  epochs: 50
  amp: true
  drop_last: true
  gradient_clip_norm: null

optimizer:
  name: adamw
  lr: 0.0001
  weight_decay: 0.0001

scheduler:
  name: cosine
  t_max: 100
  min_lr: 0.000001

model:
  name: convnext_vit_hybrid
  patch_size: 16
  dropout: 0.1
  num_layers : 4

output:
  checkpoint_dir: outputs/checkpoints/convnext-vit
  log_dir: outputs/logs/convnext-vit
  figure_dir: outputs/figures/convnext-vit
  predictions_dir: outputs/predictions/convnext-vit
  save_best_only: true
  monitor: val_loss
  mode: min

