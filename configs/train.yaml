project_name: convnext_vit_torch
experiment_name: exp01_bootstrap

seed: 42
device: auto   # auto | cpu | cuda
deterministic: false

data:
  train_csv: "data/folds/breakhis_1_train.csv"
  val_csv: "data/folds/breakhis_1_val.csv"
  test_csv: "data/folds/breakhis_1_test.csv"
  image_col: image_path
  label_col: label
  num_classes: 8
  input_size: 224
  num_workers: 0
  pin_memory: false

train:
  batch_size: 16
  epochs: 20
  amp: true
  gradient_clip_norm: null

optimizer:
  name: adamw
  lr: 0.0001
  weight_decay: 0.0001

scheduler:
  name: cosine
  t_max: 20
  min_lr: 0.000001

model:
  name: convnext_vit_hybrid
  patch_size: 16
  dropout: 0.1

output:
  checkpoint_dir: outputs/checkpoints
  log_dir: outputs/logs
  figure_dir: outputs/figures
  predictions_dir: outputs/predictions
  save_best_only: true
  monitor: val_loss
  mode: min
